name: quickbite

x-backend-common: &backend-common
  restart: unless-stopped
  environment:
    EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
  depends_on:
    eureka-server:
      condition: service_healthy

x-mysql-common: &mysql-common
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: abcd

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: abcd
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pabcd --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.7.2
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  eureka-server:
    build:
      context: .
      dockerfile: backend/eureka-server/Dockerfile
    image: quickbite/eureka-server:local
    restart: unless-stopped
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O /dev/null http://localhost:8761/ || exit 1"]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 120s

  api-gateway:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    image: quickbite/api-gateway:local
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      AUTH_SERVICE_URI: lb://AUTH-SERVICE
      RESTAURANT_SERVICE_URI: lb://RESTAURANT-SERVICE
      ORDER_SERVICE_URI: lb://ORDER-SERVICE
      CART_SERVICE_URI: lb://CART-SERVICE
      TRACKING_SERVICE_URI: lb://TRACKING-SERVICE
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "9090:9090"

  auth-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    image: quickbite/auth-service:local
    environment:
      <<: *mysql-common
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: quickbite_auth
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: abcd
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      APP_OAUTH2_REDIRECT_URI: http://localhost:3000/oauth/callback
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  restaurant-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/restaurant-service/Dockerfile
    image: quickbite/restaurant-service:local
    environment:
      <<: *mysql-common
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quickbite_restaurant?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      CLOUDINARY_ENABLED: "false"
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  menu-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/menu-service/Dockerfile
    image: quickbite/menu-service:local
    environment:
      <<: *mysql-common
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quickbite_menu?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      CLOUDINARY_ENABLED: "false"
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "9093:9093"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  cart-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/cart-service/Dockerfile
    image: quickbite/cart-service:local
    environment:
      <<: *mysql-common
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quickbite_cart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  order-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    image: quickbite/order-service:local
    environment:
      <<: *mysql-common
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      ORDER_DB_URL: jdbc:mysql://mysql:3306/quickbite_order?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      ORDER_DB_USERNAME: root
      ORDER_DB_PASSWORD: abcd
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  payment-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/payment-service/Dockerfile
    image: quickbite/payment-service:local
    environment:
      <<: *mysql-common
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quickbite_payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  delivery-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/delivery-service/Dockerfile
    image: quickbite/delivery-service:local
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "8087:8087"
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  review-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/review-service/Dockerfile
    image: quickbite/review-service:local
    environment:
      <<: *mysql-common
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quickbite_review?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      JWT_SECRET: UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  tracking-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/tracking-service/Dockerfile
    image: quickbite/tracking-service:local
    ports:
      - "8089:8089"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:9090
        VITE_AUTH_API_BASE_URL: http://localhost:9090
        VITE_ADMIN_API_BASE_URL: http://localhost:9090
        VITE_OAUTH_BASE_URL: http://localhost:9090
    image: quickbite/frontend:local
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  mysql-data:
  kafka-data:
