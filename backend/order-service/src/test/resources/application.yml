spring:
  datasource:
    url: jdbc:h2:mem:quickbite_order_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    enabled: false

app:
  kafka:
    order-events-topic: order-events
