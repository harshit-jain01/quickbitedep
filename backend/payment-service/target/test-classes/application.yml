spring:
  datasource:
    url: jdbc:h2:mem:quickbite_payment_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-test-group

eureka:
  client:
    enabled: false

app:
  razorpay:
    key-id: rzp_test_key
    key-secret: test_secret
