server:
  port: 8081

spring:
  config:
    import: optional:file:.env[.properties],optional:file:auth-service/.env[.properties]
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:quickbite_auth}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:abcd}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
        provider:
          google:
            user-name-attribute: sub

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

security:
  jwt:
    secret: ${JWT_SECRET:UVVpY2tCaXRlU3VwZXJTZWNyZXRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==}
    access-token-expiration-ms: 86400000

app:
  fixed-admin:
    email: ${FIXED_ADMIN_EMAIL:admin123@gmail.com}
    password: ${FIXED_ADMIN_PASSWORD:admin123}
    full-name: ${FIXED_ADMIN_FULL_NAME:Super Admin}
  oauth2:
    authorized-redirect-uri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}

management:
  endpoints:
    web:
      exposure:
        include: health,info
