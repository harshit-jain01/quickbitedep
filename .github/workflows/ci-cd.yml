name: QuickBite CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    name: Backend tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - auth-service
          - restaurant-service
          - menu-service
          - cart-service
          - payment-service
          - delivery-service
          - order-service
          - review-service
          - tracking-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test ${{ matrix.service }}
        run: mvn -B -ntp -f "${BACKEND_DIR}/${{ matrix.service }}/pom.xml" test

  frontend-tests:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm test

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

  docker-build-and-publish:
    name: Docker build and publish (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: eureka-server
            dockerfile: backend/eureka-server/Dockerfile
          - image: api-gateway
            dockerfile: backend/api-gateway/Dockerfile
          - image: auth-service
            dockerfile: backend/auth-service/Dockerfile
          - image: restaurant-service
            dockerfile: backend/restaurant-service/Dockerfile
          - image: menu-service
            dockerfile: backend/menu-service/Dockerfile
          - image: cart-service
            dockerfile: backend/cart-service/Dockerfile
          - image: payment-service
            dockerfile: backend/payment-service/Dockerfile
          - image: delivery-service
            dockerfile: backend/delivery-service/Dockerfile
          - image: order-service
            dockerfile: backend/order-service/Dockerfile
          - image: review-service
            dockerfile: backend/review-service/Dockerfile
          - image: tracking-service
            dockerfile: backend/tracking-service/Dockerfile
          - image: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        run: echo "name=harshitjain011/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy to EC2 (Docker Compose)
    runs-on: ubuntu-latest
    needs: [docker-build-and-publish]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Validate deployment secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          APP_OAUTH2_REDIRECT_URI: ${{ secrets.APP_OAUTH2_REDIRECT_URI }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$EC2_HOST" || { echo "Missing EC2_HOST secret"; exit 1; }
          test -n "$EC2_USER" || { echo "Missing EC2_USER secret"; exit 1; }
          test -n "$EC2_SSH_KEY" || { echo "Missing EC2_SSH_KEY secret"; exit 1; }
          test -n "$JWT_SECRET" || { echo "Missing JWT_SECRET secret"; exit 1; }
          test -n "$MYSQL_ROOT_PASSWORD" || { echo "Missing MYSQL_ROOT_PASSWORD secret"; exit 1; }
          test -n "$MYSQL_PASSWORD" || { echo "Missing MYSQL_PASSWORD secret"; exit 1; }
          test -n "$GOOGLE_CLIENT_ID" || { echo "Missing GOOGLE_CLIENT_ID secret"; exit 1; }
          test -n "$GOOGLE_CLIENT_SECRET" || { echo "Missing GOOGLE_CLIENT_SECRET secret"; exit 1; }
          test -n "$RAZORPAY_KEY_ID" || { echo "Missing RAZORPAY_KEY_ID secret"; exit 1; }
          test -n "$RAZORPAY_KEY_SECRET" || { echo "Missing RAZORPAY_KEY_SECRET secret"; exit 1; }
          test -n "$APP_OAUTH2_REDIRECT_URI" || { echo "Missing APP_OAUTH2_REDIRECT_URI secret"; exit 1; }
          test -n "$DOCKERHUB_USERNAME" || { echo "Missing DOCKERHUB_USERNAME secret"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "Missing DOCKERHUB_TOKEN secret"; exit 1; }

      - name: Validate SSH private key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/quickbite_deploy_key
          chmod 600 ~/.ssh/quickbite_deploy_key
          ssh-keygen -y -f ~/.ssh/quickbite_deploy_key > /dev/null

      - name: Test SSH login
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/quickbite_deploy_key \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=20 \
            "$EC2_USER@$EC2_HOST" \
            "echo SSH login successful"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="$HOME/quickbite"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            if [ -d "$DEPLOY_DIR/.git" ]; then
              git -C "$DEPLOY_DIR" fetch origin "$BRANCH"
              git -C "$DEPLOY_DIR" checkout "$BRANCH"
              git -C "$DEPLOY_DIR" reset --hard "origin/$BRANCH"
            else
              if [ -e "$DEPLOY_DIR" ]; then
                mv "$DEPLOY_DIR" "$DEPLOY_DIR.backup.$(date +%Y%m%d%H%M%S)"
              fi
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            cat << 'EOF' > .env
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            APP_OAUTH2_REDIRECT_URI=${{ secrets.APP_OAUTH2_REDIRECT_URI }}
            EOF
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            sudo docker image prune -f

            sudo docker logout
