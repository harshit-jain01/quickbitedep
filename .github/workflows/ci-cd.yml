name: QuickBite CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    name: Backend tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - auth-service
          - restaurant-service
          - menu-service
          - cart-service
          - payment-service
          - delivery-service
          - order-service
          - review-service
          - tracking-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test ${{ matrix.service }}
        run: mvn -B -ntp -f "${BACKEND_DIR}/${{ matrix.service }}/pom.xml" test

  frontend-tests:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm test

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

  docker-build-and-publish:
    name: Docker build and publish (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: eureka-server
            dockerfile: backend/eureka-server/Dockerfile
          - image: api-gateway
            dockerfile: backend/api-gateway/Dockerfile
          - image: auth-service
            dockerfile: backend/auth-service/Dockerfile
          - image: restaurant-service
            dockerfile: backend/restaurant-service/Dockerfile
          - image: menu-service
            dockerfile: backend/menu-service/Dockerfile
          - image: cart-service
            dockerfile: backend/cart-service/Dockerfile
          - image: payment-service
            dockerfile: backend/payment-service/Dockerfile
          - image: delivery-service
            dockerfile: backend/delivery-service/Dockerfile
          - image: order-service
            dockerfile: backend/order-service/Dockerfile
          - image: review-service
            dockerfile: backend/review-service/Dockerfile
          - image: tracking-service
            dockerfile: backend/tracking-service/Dockerfile
          - image: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        run: echo "name=harshitjain011/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy to EC2 (Docker Compose)
    runs-on: ubuntu-latest
    needs: [docker-build-and-publish]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/quickbite"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/quickbite
            cd ~/quickbite
            cat << 'EOF' > .env
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            APP_OAUTH2_REDIRECT_URI=${{ secrets.APP_OAUTH2_REDIRECT_URI }}
            EOF
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            sudo docker image prune -f
