version: '3.8'

services:
  eureka-server:
    image: harshitjain011/eureka-server:latest
    build:
      context: . # Dummy context to override base
      dockerfile: Dockerfile # Override to ignore base build

  api-gateway:
    image: harshitjain011/api-gateway:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET}

  auth-service:
    image: harshitjain011/auth-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}

  restaurant-service:
    image: harshitjain011/restaurant-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET}

  menu-service:
    image: harshitjain011/menu-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET}

  cart-service:
    image: harshitjain011/cart-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET}

  order-service:
    image: harshitjain011/order-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ORDER_DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  payment-service:
    image: harshitjain011/payment-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      JWT_SECRET: ${JWT_SECRET}

  delivery-service:
    image: harshitjain011/delivery-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET}

  review-service:
    image: harshitjain011/review-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET}

  tracking-service:
    image: ghcr.io/harshit-jain01/quickbitedep/tracking-service:latest
    build:
      context: .
      dockerfile: Dockerfile

  frontend:
    image: ghcr.io/harshit-jain01/quickbitedep/frontend:latest
    build:
      context: .
      dockerfile: Dockerfile

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
